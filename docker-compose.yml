services:
  api:
    image: quoin-api:${VERSION:-latest}
    build: .
    command: fastapi dev app/main.py --host 0.0.0.0 --port 8000
    volumes:
      - ./app:/app/app
    ports:
      - "8000:8000"
    environment:
      - QUOIN_ENV=development
      - QUOIN_POSTGRES_DRIVER=postgresql+asyncpg
      - QUOIN_POSTGRES_HOST=db
      - QUOIN_POSTGRES_PORT=5432
      - QUOIN_POSTGRES_USER=postgres
      - QUOIN_POSTGRES_PASSWORD=postgres
      - QUOIN_POSTGRES_DB=app_db
      - QUOIN_OAUTH_JWKS_URI=http://oauth:8080/default/jwks
      - QUOIN_OAUTH_ISSUER=http://oauth:8080/default
      - QUOIN_OAUTH_AUDIENCE=default
    depends_on:
      - db
      - oauth

  db:
    image: postgres:18
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=app_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d app_db"]
      interval: 2s
      timeout: 5s
      retries: 20
      start_period: 10s

  oauth:
    image: ghcr.io/navikt/mock-oauth2-server:3.0.1
    ports:
      - "8080:8080"
    healthcheck:
      test:
        - "CMD"
        - "wget"
        - "-qO"
        - "/dev/null"
        - "http://localhost:8080/default/.well-known/openid-configuration"
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  docs:
    image: quoin-api-docs:${VERSION:-latest}
    build:
      context: .
      target: builder
    command: /bin/sh -c "uv sync --group docs && uv run python -m zensical serve -a 0.0.0.0:8001"
    ports:
      - "8001:8001"
    volumes:
      - ./docs:/app/docs
      - ./zensical.toml:/app/zensical.toml
      - ./app:/app/app

volumes:
  postgres_data:
